# Deploys this repo to Cloudflare Pages project "landing" (landing-5xo.pages.dev, custom domains).
# Wrangler cannot attach the dashboard "Connect to Git" integration; this workflow deploys with Wrangler on every push.
#
# GitHub repo secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN  — Create at https://dash.cloudflare.com/profile/api-tokens
#                         Use template "Edit Cloudflare Workers" or custom with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — From wrangler whoami or dashboard sidebar (copy account id)
#
# Cloudflare Pages project "landing" also needs these (Workers & Pages → landing → Settings → Variables and secrets).
# They are NOT in the repo — set in the dashboard or via `wrangler pages secret put`:
#   STRIPE_PUBLISHABLE_KEY, STRIPE_SECRET_KEY
#   LEAD_OPTIN_WEBHOOK_URL, PAYMENT_COMPLETED_WEBHOOK_URL, ONBOARDING_WEBHOOK_URL (GHL inbound webhook URLs;
#   optional placeholder until GHL is wired: https://httpbin.org/post)
#   Optional: LEAD_WEBHOOK_AUTH_HEADER + LEAD_WEBHOOK_AUTH_VALUE

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static output
        run: node scripts/build-pages-dist.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.83.0"
          command: pages deploy dist --project-name=landing --branch=${{ github.ref_name }} --commit-hash=${{ github.sha }}
